# --- Variables & App Paths ---
$wallpaper = ~/.config/hypr/wallpaper.png
$terminal  = kitty
$browser   = firefox
$slack     = slack
$notes     = obsidian
$menu      = wofi --show drun
$sshot     = hyprshot
$mainMod   = ALT

# --- Monitor Configuration ---
monitor=,preferred,auto,auto

# --- Window Rules & Layouts ---
general {
    gaps_in = 5
    gaps_out = 5
    border_size = 1
    col.active_border = rgba(e2e8e9ee) rgba(708090ee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
    resize_on_border = false
}

input {
    kb_layout = us
    follow_mouse = 1
    touchpad {
        natural_scroll = false
    }
}

decoration {
    rounding = 2
    active_opacity = 1.0
    inactive_opacity = 1.0
}

dwindle {
    preserve_split = true
}

# --- Animations ---
animations {
    enabled = true

    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear, 0, 0, 1, 1
    bezier = almostLinear, 0.5, 0.5, 0.75, 1
    bezier = quick, 0.15, 0, 0.1, 1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
    animation = zoomFactor, 1, 7, quick
}

# --- Core Keybinds ---
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, B, exec, $browser
bind = $mainMod, Z, exec, $slack
bind = $mainMod, C, killactive
bind = $mainMod, O, exec, $notes
bind = $mainMod, M, exit
bind = $mainMod, R, exec, $menu
bind = $mainMod, v, pseudo,
#bind = $mainMod, n, togglesplit,

# --- Navigation (Vim Keys) ---
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# --- Workspace Switching ---
bind = $mainMod, a, workspace, 1
bind = $mainMod, s, workspace, 2
bind = $mainMod, d, workspace, 3
bind = $mainMod, f, workspace, 4
bind = $mainMod, g, workspace, 5
bind = $mainMod, TAB, togglespecialworkspace

# --- Screenshots ---
bind = $mainMod, P, exec, $sshot --notify -m window -m active --clipboard-only
bind = $mainMod SHIFT, P, exec, $sshot --notify -m output -m active --clipboard-only

# --- Hardware / Lid Switches ---
bindl = , switch:on:Lid Switch, exec, hyprctl keyword monitor eDP-1, disable
bindl = , switch:off:Lid Switch, exec, hyprctl keyword monitor eDP-1, preferred, auto, auto

# --- Autostart Daemons ---
exec-once = waybar
exec-once = mako
exec-once = awww-daemon && sleep 0.5
exec-once = awww img $wallpaper
